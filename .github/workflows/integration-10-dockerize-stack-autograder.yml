name: "Integration 10 — Dockerize Stack Autograder"
on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  structural:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Tier 4 note: this assignment IS the Docker Compose stack. The `stack`
    # job below brings up the full multi-service topology via `docker
    # compose up -d --build` rather than runner-level `services:`. This
    # empty key documents that intent and satisfies the validator gate
    # (see validate_module.sh Check 8).
    services: {}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install structural-test deps
        run: pip install pytest PyYAML
      - name: Structural autograder
        run: pytest tests/ -v --tb=short

  stack:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: structural
    env:
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testtest12345
      WEB_ORIGIN: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - name: Create .env from CI vars
        run: |
          # NEO4J_AUTH is passed into the neo4j service (user/password)
          # and is required for the container to start with credentials.
          # NEO4J_USER + NEO4J_PASSWORD are interpolated by Compose at
          # parse time into the api service env and into the seed
          # script's cypher-shell command.
          cat > .env <<'EOF'
          NEO4J_AUTH=neo4j/testtest12345
          NEO4J_USER=neo4j
          NEO4J_PASSWORD=testtest12345
          WEB_ORIGIN=http://localhost:3000
          EOF
      - name: docker compose up
        run: docker compose up -d --build
      - name: Wait for healthy — tiered ordering check
        run: |
          # Three-phase wait: data tiers first, api next, web last.
          # If a later-tier service reaches healthy BEFORE an earlier-tier
          # one, fail with the offending service name — that's the signal
          # the depends_on chain is wrong (the api or web service started
          # before its backend was ready).
          DATA_TIER="neo4j weaviate"
          API_TIER="api"
          WEB_TIER="web"

          # Helper: status of one service (or empty if not present).
          svc_status() {
            docker compose ps "$1" --format json | \
              python3 -c "import sys,json; lines=[l for l in sys.stdin if l.strip()]; print(json.loads(lines[0]).get('Health','')) if lines else print('')"
          }

          # Phase 1 — data tier: neo4j + weaviate must reach healthy first.
          # While we wait, api and web must NOT yet be healthy (ordering check).
          for i in $(seq 1 60); do
            data_ok=true
            for svc in $DATA_TIER; do
              [ "$(svc_status $svc)" != "healthy" ] && data_ok=false
            done
            if [ "$data_ok" = "true" ]; then
              echo "phase 1 ok: data tier healthy ($DATA_TIER)"
              break
            fi
            # Premature-healthy check: api or web went healthy before data.
            for svc in $API_TIER $WEB_TIER; do
              if [ "$(svc_status $svc)" = "healthy" ]; then
                echo "FAILED ordering: $svc reached healthy before $DATA_TIER — depends_on chain is wrong"
                docker compose ps
                exit 1
              fi
            done
            sleep 2
          done
          if [ "$data_ok" != "true" ]; then
            echo "FAILED: data tier did not reach healthy within budget"
            docker compose ps
            docker compose logs neo4j weaviate
            exit 1
          fi

          # Phase 2 — api: must reach healthy now. web must NOT yet be healthy.
          # Budget is intentionally larger than phases 1 and 3 (150 × 2s =
          # 5 min) because the api lifespan loads spaCy en_core_web_sm AND
          # flan-t5-base via transformers — a cold HuggingFace cache on a
          # fresh runner downloads ~250 MB. 90s was tight enough to red
          # CI through no fault of the team; 5 min covers cold cache and
          # a generous safety margin.
          for i in $(seq 1 150); do
            api_ok=true
            [ "$(svc_status $API_TIER)" != "healthy" ] && api_ok=false
            if [ "$api_ok" = "true" ]; then
              echo "phase 2 ok: api healthy"
              break
            fi
            if [ "$(svc_status $WEB_TIER)" = "healthy" ]; then
              echo "FAILED ordering: web reached healthy before api — depends_on chain is wrong"
              docker compose ps
              exit 1
            fi
            sleep 2
          done
          if [ "$api_ok" != "true" ]; then
            echo "FAILED: api did not reach healthy within 5-min budget"
            docker compose ps
            docker compose logs api
            exit 1
          fi

          # Phase 3 — web: must reach healthy.
          for i in $(seq 1 60); do
            if [ "$(svc_status $WEB_TIER)" = "healthy" ]; then
              echo "phase 3 ok: web healthy — full ordering correct"
              docker compose ps
              exit 0
            fi
            sleep 2
          done
          echo "FAILED: web did not reach healthy within budget"
          docker compose ps
          docker compose logs web
          exit 1
      - name: Seed scripts (first run)
        run: |
          bash scripts/seed_neo4j.sh
          bash scripts/seed_weaviate.sh
      - name: Seed scripts (re-run — data-layer idempotency)
        run: |
          # Second invocation must succeed without errors and without
          # duplicating data. A learner using `CREATE` (Cypher) instead
          # of `MERGE`, or omitting the `schema.exists("Chunk")` guard
          # in the Weaviate seeder, fails this step.
          bash scripts/seed_neo4j.sh
          bash scripts/seed_weaviate.sh
      - name: Demo curl — content check (not just 200)
        id: demo_curl_first
        run: |
          # 200 alone is insufficient. The sentinel response
          # `{"answer":"I cannot answer this from the available sources",
          # "citations":[],"confidence":0.0}` also returns 200. Require:
          #   - len(citations) > 0
          #   - confidence > 0
          #   - answer != sentinel
          # All three together prove end-to-end retrieval + generation
          # actually worked.
          response=$(curl -fsS -X POST http://localhost:8000/rag/answer \
            -H 'Content-Type: application/json' \
            -d '{"question": "How do I prep ginger for stir-fry?"}')
          echo "$response"
          echo "$response" | python3 - <<'PY'
          import json, sys
          data = json.load(sys.stdin)
          SENTINEL = "I cannot answer this from the available sources"
          assert len(data["citations"]) > 0, f"no citations: {data}"
          assert data["confidence"] > 0, f"confidence not positive: {data['confidence']}"
          assert data["answer"] != SENTINEL, "answer is sentinel — retrieval or generation failed"
          print(f"ok: {len(data['citations'])} citation(s), confidence={data['confidence']}")
          PY
      - name: Full-stack idempotency — down -v + re-up + re-seed + re-curl
        run: |
          # Data-layer idempotency (seed re-run) is necessary but not
          # sufficient. A learner can ship a stack that works on the FIRST
          # cohort run but breaks on a re-deploy because (a) the api or
          # web image carries hidden mutable state, (b) the volume
          # configuration loses state on `down -v`, or (c) the seed
          # scripts depend on first-up ordering side-effects. Exercise
          # the full volume-and-stack reset.
          docker compose down -v
          docker compose up -d --wait --build
          bash scripts/seed_neo4j.sh
          bash scripts/seed_weaviate.sh
          response=$(curl -fsS -X POST http://localhost:8000/rag/answer \
            -H 'Content-Type: application/json' \
            -d '{"question": "How do I prep ginger for stir-fry?"}')
          echo "$response"
          echo "$response" | python3 - <<'PY'
          import json, sys
          data = json.load(sys.stdin)
          SENTINEL = "I cannot answer this from the available sources"
          assert len(data["citations"]) > 0, f"no citations after re-up: {data}"
          assert data["confidence"] > 0, f"confidence not positive after re-up: {data['confidence']}"
          assert data["answer"] != SENTINEL, "answer is sentinel after re-up — stack is not idempotent"
          print(f"full-stack idempotency ok: {len(data['citations'])} citation(s), confidence={data['confidence']}")
          PY
      - name: Playwright smoke (against running stack)
        run: |
          cd web
          npm ci
          npx playwright install --with-deps chromium
          npx playwright test ../tests/frontend/playwright
      - name: Tear down
        if: always()
        run: docker compose down -v
